<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Space Shooter" />
  <meta name="theme-color" content="#000011" />

  <title>Space Shooter</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000011; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
  <!-- Phaser served locally so the game works offline -->
  <script src="js/phaser.min.js"></script>
  <script src="js/game.js"></script>

  <script>
    // Register service worker for offline / installable app
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW error', e));
      });
    }
  </script>
</body>
</html>
